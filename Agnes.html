                        const card = document.querySelector(`[data-platform-id="${platformId}"]`);
                        if (card) card.classList.add('expanded');
                        showToast(`已添加 ${selectedModels.length} 个模型`, 'success');
                    });
                } catch { showToast('获取失败，请检查网络', 'error'); }
            }

            // 查询单个模型额度 (通过零成本探测请求读取响应头)
            window.checkModelQuotaUI = async function(platformId, modelId) {
                const p = apiManager.platforms.find(pp => pp.id === platformId);
                if (!p) return;
                const idleKey = p.keys ? p.keys.find(k => !k.status || k.status === 'idle') : null;
                if (!idleKey) { showToast('请先添加密钥', 'error'); return; }

                // 创建弹窗
                const old = document.getElementById('quotaPopupOverlay');
                if (old) old.remove();
                const overlay = document.createElement('div');
                overlay.id = 'quotaPopupOverlay';
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10000;display:flex;align-items:center;justify-content:center;';
                overlay.innerHTML = `<div class="quota-popup">
                    <div class="quota-popup-title">额度查询 - ${escapeHtml(modelId)}</div>
                    <div class="quota-popup-loading">正在查询，请稍候...</div>
                    <button class="quota-popup-close" onclick="this.closest('#quotaPopupOverlay').remove()">关闭</button>
                </div>`;
                overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
                document.body.appendChild(overlay);
                const loadingEl = overlay.querySelector('.quota-popup-loading');

                // 获取模型信息，按能力类型选择探测接口
                const modelInfo = p.models ? p.models.find(m => m.id === modelId) : null;
                const caps = modelInfo && modelInfo.capabilities ? modelInfo.capabilities : [];
                const isImageModel = caps.includes('text2img') || caps.includes('edit');
                const isModelScope = p.baseUrl && p.baseUrl.includes('modelscope');

                // 构建探测请求
                function buildProbeRequest(useImageApi) {
                    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idleKey.value}` };
                    if (useImageApi && isModelScope) headers['X-ModelScope-Async-Mode'] = 'true';
                    if (useImageApi) {
                        return {
                            url: apiManager.getApiUrl(platformId, '/images/generations'),
                            body: { model: modelId, prompt: '', n: 1, size: '1024x1024' },
                            headers
                        };
                    }
                    return {
                        url: apiManager.getApiUrl(platformId, '/chat/completions'),
                        body: { model: modelId, messages: [], max_tokens: 1 },
                        headers
                    };
                }

                // 解析探测响应，返回 { status, color, retryImage? }
                async function parseProbeResponse(res, useImageApi) {
                    const status = res.status;
                    if (status === 200) return { status: '可用', color: 'var(--success)' };
                    if (status === 429) return { status: '可用（被限流）', color: 'var(--success)' };
                    if (status === 404) return { status: '模型不存在', color: 'var(--error)' };

                    if (status === 403) {
                        const ed = await res.json().catch(() => ({}));
                        const msg = ed.error?.message || ed.message || '';
                        if (msg.includes('hosted') || msg.includes('托管')) {
                            return { status: '需要托管密钥', color: 'var(--warning)' };
                        }
                        return { status: '无权限访问', color: 'var(--warning)' };
                    }

                    const ed = await res.json().catch(() => ({}));
                    const msg = ed.error?.message || ed.message || `HTTP ${status}`;

                    if (msg.includes('no provider') || msg.includes('provider')) {
                        return { status: '无提供商支持', color: 'var(--error)' };
                    }
                    if (msg.includes('not found') || msg.includes('不存在') || msg.includes('no such')) {
                        return { status: '模型不存在', color: 'var(--error)' };
                    }

                    // 生图接口返回 400（空 prompt 参数错误），说明模型存在且可访问
                    if (useImageApi && status === 400) {
                        return { status: '可用', color: 'var(--success)' };
                    }

                    // 聊天接口提示"不支持" → 可能是生图模型，需换接口重试
                    if (!useImageApi && (msg.includes('not support') || msg.includes('不支持') || msg.includes('chat') || msg.includes('completion'))) {
                        return { status: '', color: '', retryImage: true };
                    }

                    return { status: msg.substring(0, 40), color: 'var(--warning)' };
                }

                try {
                    // 首次探测：生图模型走 images 接口，其余走 chat 接口
                    let useImageApi = isImageModel;
                    let probe = buildProbeRequest(useImageApi);
                    let t0 = Date.now();
                    let res = await fetch(probe.url, { method: 'POST', headers: probe.headers, body: JSON.stringify(probe.body) });
                    let ms = Date.now() - t0;

                    let result = await parseProbeResponse(res, useImageApi);

                    // 聊天接口提示不支持，自动尝试生图接口
                    if (result.retryImage) {
                        useImageApi = true;
                        probe = buildProbeRequest(true);
                        t0 = Date.now();
                        res = await fetch(probe.url, { method: 'POST', headers: probe.headers, body: JSON.stringify(probe.body) });
                        ms += Date.now() - t0;
                        result = await parseProbeResponse(res, true);
                    }

                    const h = res.headers;
                    const modelLimit = h.get('modelscope-ratelimit-model-requests-limit');
                    const modelRemain = h.get('modelscope-ratelimit-model-requests-remaining');
                    const userLimit = h.get('modelscope-ratelimit-requests-limit');
                    const userRemain = h.get('modelscope-ratelimit-requests-remaining');

                    let availabilityStatus = result.status;
                    let availabilityColor = result.color;

                    if (modelLimit || modelRemain || userLimit || userRemain) {
                        const rows = [];
                        // 显示可用性状态
                        rows.push(`<div class="quota-popup-row"><span class="quota-popup-label">模型状态</span><span class="quota-popup-value" style="color:${availabilityColor}">${availabilityStatus}</span></div>`);
                        // 显示额度信息
                        if (modelLimit) rows.push(`<div class="quota-popup-row"><span class="quota-popup-label">模型总限额</span><span class="quota-popup-value">${escapeHtml(modelLimit)}</span></div>`);
                        if (modelRemain) rows.push(`<div class="quota-popup-row"><span class="quota-popup-label">模型剩余</span><span class="quota-popup-value">${escapeHtml(modelRemain)}</span></div>`);
                        if (userLimit) rows.push(`<div class="quota-popup-row"><span class="quota-popup-label">账号总限额</span><span class="quota-popup-value">${escapeHtml(userLimit)}</span></div>`);
                        if (userRemain) rows.push(`<div class="quota-popup-row"><span class="quota-popup-label">账号剩余</span><span class="quota-popup-value">${escapeHtml(userRemain)}</span></div>`);
                        rows.push(`<div class="quota-popup-row"><span class="quota-popup-label">查询耗时</span><span class="quota-popup-value">${ms}ms</span></div>`);
                        loadingEl.outerHTML = rows.join('');
                    } else if (res.status === 429) {
                        loadingEl.outerHTML = `<div class="quota-popup-row"><span class="quota-popup-label">模型状态</span><span class="quota-popup-value" style="color:${availabilityColor}">${availabilityStatus}</span></div>
                            <div class="quota-popup-row"><span class="quota-popup-label">说明</span><span class="quota-popup-value">该模型当前被限流，但可用</span></div>`;
                    } else {
                        loadingEl.outerHTML = `<div class="quota-popup-row"><span class="quota-popup-label">模型状态</span><span class="quota-popup-value" style="color:${availabilityColor}">${availabilityStatus}</span></div>
                            <div class="quota-popup-row"><span class="quota-popup-label">说明</span><span class="quota-popup-value">该平台未返回额度信息</span></div>`;
                    }
                } catch (e) {
                    loadingEl.outerHTML = `<div class="quota-popup-row"><span class="quota-popup-label">错误</span><span class="quota-popup-value" style="color:var(--error)">${escapeHtml(e.message || '网络错误')}</span></div>
                        <div class="quota-popup-row"><span class="quota-popup-label">提示</span><span class="quota-popup-value">魔搭平台需启动本地代理 (proxy_server.py)</span></div>`;
                }
            }

            function showModelEditModal(platformId, modelId) {
                const p = apiManager.platforms.find(pp => pp.id === platformId);
                if (!p) return;
                const existing = modelId ? p.models.find(m => m.id === modelId) : null;
                const isEdit = !!existing;

                // 移除旧弹窗
                const old = document.getElementById('modelEditOverlay');
                if (old) old.remove();

                const overlay = document.createElement('div');
                overlay.id = 'modelEditOverlay';
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10000;display:flex;align-items:center;justify-content:center;';

                const capCheckboxes = CAP_OPTIONS.map(c => {
                    const checked = existing && existing.capabilities && existing.capabilities.includes(c.key) ? 'checked' : (!existing && c.key === 'text' ? 'checked' : '');
                    return `<label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0;font-size:0.82rem;color:var(--text-primary);"><input type="checkbox" value="${c.key}" ${checked} style="accent-color:var(--text-primary);">${c.label}</label>`;
                }).join('');

                // 默认参数（仅对生图/视频模型有意义）
                const dp = (existing && existing.defaultParams) || {};
                const isImgOrVideo = existing && existing.capabilities && (existing.capabilities.includes('text2img') || existing.capabilities.includes('edit') || existing.capabilities.includes('video'));
                const samplerOptions = ['', 'euler', 'euler-a', 'ddim', 'dpm++', 'dpm++-karras', 'dpm-sde', 'dpm2-karras', 'heun', 'lms', 'pndm'];
                const samplerOptsHtml = samplerOptions.map(s => `<option value="${s}" ${dp.sampler === s ? 'selected' : ''}>${s || '默认'}</option>`).join('');

                    <div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:8px;">默认参数（留空用平台推荐，生图/视频时未手动填写则使用此值）</div>
                    <div class="form-row" style="display:flex;gap:10px;margin-bottom:8px;">
                        <div class="form-group" style="flex:1;margin:0;"><label style="font-size:0.72rem;color:var(--text-muted);display:block;margin-bottom:2px;">默认CFG</label><input id="meDefCfg" class="form-input" type="number" min="1" max="30" step="0.5" value="${dp.cfg != null ? dp.cfg : ''}" placeholder="留空" style="width:100%;box-sizing:border-box;"></div>
                        <div class="form-group" style="flex:1;margin:0;"><label style="font-size:0.72rem;color:var(--text-muted);display:block;margin-bottom:2px;">默认步数</label><input id="meDefSteps" class="form-input" type="number" min="1" max="100" step="1" value="${dp.steps != null ? dp.steps : ''}" placeholder="留空" style="width:100%;box-sizing:border-box;"></div>
                    </div>
                    <div class="form-group" style="margin:0 0 8px 0;"><label style="font-size:0.72rem;color:var(--text-muted);display:block;margin-bottom:2px;">默认采样方法</label><select id="meDefSampler" class="form-input" style="width:100%;box-sizing:border-box;">${samplerOptsHtml}</select></div>
                    <div class="form-group" style="margin:0;"><label style="font-size:0.72rem;color:var(--text-muted);display:block;margin-bottom:2px;">默认负面提示词</label><input id="meDefNeg" class="form-input" type="text" value="${dp.negative_prompt ? escapeHtml(dp.negative_prompt) : ''}" placeholder="留空" style="width:100%;box-sizing:border-box;"></div>
                </div>`;

                overlay.innerHTML = `<div style="background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:24px;width:360px;max-width:90vw;max-height:90vh;overflow-y:auto;">
                    <div style="font-size:0.95rem;font-weight:600;margin-bottom:16px;color:var(--text-primary);">${isEdit ? '编辑模型' : '添加模型'}</div>
                    <div style="margin-bottom:12px;"><label style="font-size:0.78rem;color:var(--text-secondary);display:block;margin-bottom:4px;">模型ID</label><input id="meId" class="form-input" value="${existing ? escapeHtml(existing.id) : ''}" ${isEdit ? 'readonly style="opacity:0.6;"' : ''} style="width:100%;box-sizing:border-box;"></div>
                    <div style="margin-bottom:12px;"><label style="font-size:0.78rem;color:var(--text-secondary);display:block;margin-bottom:4px;">模型名称</label><input id="meName" class="form-input" value="${existing ? escapeHtml(existing.name || '') : ''}" style="width:100%;box-sizing:border-box;"></div>
                    <div style="margin-bottom:12px;"><label style="font-size:0.78rem;color:var(--text-secondary);display:block;margin-bottom:6px;">能力标签</label>${capCheckboxes}</div>
                    ${defaultParamsHtml}
                    <div style="display:flex;gap:8px;justify-content:flex-end;">
                        <button class="preset-btn" onclick="document.getElementById('modelEditOverlay').remove()">取消</button>
                        <button class="btn-generate" id="meSaveBtn">保存</button>
                    </div>
                </div>`;

                document.body.appendChild(overlay);
                overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

                // 根据模型ID自动推断能力标签，并自动填充名称
                if (!isEdit) {
                    const meIdInput = document.getElementById('meId');
                    const meNameInput = document.getElementById('meName');
                    let nameManuallyEdited = false;
                    meNameInput.addEventListener('input', () => { nameManuallyEdited = true; });
                    meIdInput.addEventListener('input', () => {
                        const id = meIdInput.value.trim().toLowerCase();
                        // 自动填充名称（用户未手动修改过时）
                        if (!nameManuallyEdited) {
                            meNameInput.value = meIdInput.value.trim();
                        }
                        const checkboxes = overlay.querySelectorAll('input[type=checkbox]');
                        checkboxes.forEach(cb => cb.checked = false);
                        if (!id) { checkboxes.forEach(cb => { if (cb.value === 'text') cb.checked = true; }); updateDefaultParamsVisibility(); return; }
                        let caps = ['text'];
                        if (/image|img|dall|stable|flux|sd|z-image|wanx|paint|draw|kolors|playground|sdxl|midjourney|pic|photo|art|i2v|img2vid|img2img|image2image|controlnet|ip-adapter/i.test(id)) caps = ['text2img'];
                        if (/video|vid|wan|cogvideo|animate|svd/i.test(id)) caps = ['video'];
                        if (/vl|vision|multimodal|qwen-vl|internvl/i.test(id)) caps = ['text', 'multimodal'];
                        if (/edit|inpaint|outpaint/i.test(id)) caps = ['text2img', 'edit'];
                        checkboxes.forEach(cb => { if (caps.includes(cb.value)) cb.checked = true; });
                        updateDefaultParamsVisibility();
                    });
                }

                // 能力标签变化时，更新默认参数区域显示
                function updateDefaultParamsVisibility() {
                    const caps = Array.from(overlay.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
                    const show = caps.includes('text2img') || caps.includes('edit') || caps.includes('video');
                    const paramsEl = document.getElementById('meDefaultParams');
                    if (paramsEl) paramsEl.style.display = show ? 'block' : 'none';
                }
                overlay.querySelectorAll('input[type=checkbox]').forEach(cb => {
                    cb.addEventListener('change', updateDefaultParamsVisibility);
                });
                updateDefaultParamsVisibility();

                document.getElementById('meSaveBtn').addEventListener('click', () => {
                    const id = document.getElementById('meId').value.trim();
                    const name = document.getElementById('meName').value.trim() || id;
                    const caps = Array.from(overlay.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
                    if (!id) { showToast('请输入模型ID', 'error'); return; }
                    // 读取默认参数（留空则不存）
                    const defCfg = document.getElementById('meDefCfg').value.trim();
                    const defSteps = document.getElementById('meDefSteps').value.trim();
                    const defSampler = document.getElementById('meDefSampler').value;
                    const defNeg = document.getElementById('meDefNeg').value.trim();
                    const defaultParams = {};
                    if (defCfg) defaultParams.cfg = parseFloat(defCfg);
                    if (defSteps) defaultParams.steps = parseInt(defSteps);
                    if (defSampler) defaultParams.sampler = defSampler;
                    if (defNeg) defaultParams.negative_prompt = defNeg;
                    if (!p.models) p.models = [];
                    if (isEdit) {
                        existing.name = name;
                        existing.capabilities = caps;
                        existing.defaultParams = defaultParams;
                    } else {
                        if (p.models.find(m => m.id === id)) { showToast('该模型ID已存在', 'error'); return; }
                        p.models.push({ id, name, capabilities: caps, defaultParams });
                    }
                    apiManager.save();
                    overlay.remove();
                    renderSettingsPlatforms();
                    refreshModelSelects();
                    const card = document.querySelector(`[data-platform-id="${platformId}"]`);
                    if (card) card.classList.add('expanded');
                });
            }

            // 内联添加密钥（输入框直接在平台卡片内）
            window.addKeyInline = function(platformId, btn) {

            window.addKeyUI = function(platformId) {
                // 先保存当前输入框中的平台设置，防止名称和地址丢失
                savePlatformSettings(platformId, true);
                const p = apiManager.platforms.find(pp => pp.id === platformId);
                if (!p) return;
                const key = document.getElementById('inputDialogField');
                document.getElementById('inputDialogTitle').textContent = '输入API密钥';
                key.value = '';
                key.placeholder = '请输入API密钥';
                const dialog = document.getElementById('inputDialog');
                dialog.classList.add('active');
                key.focus();
                const cleanup = () => {
                    dialog.classList.remove('active');
                    document.getElementById('inputDialogConfirm').removeEventListener('click', onConfirm);
                    document.getElementById('inputDialogCancel').removeEventListener('click', onCancel);
                };
                const onConfirm = () => {
                    const val = key.value.trim();
                    cleanup();
                    if (!val) return;
                    if (!p.keys) p.keys = [];
                    p.keys.push({ value: val, status: 'idle' });
                    apiManager.save();
                    renderSettingsPlatforms();
                    const card = document.querySelector(`[data-platform-id="${platformId}"]`);
                    if (card) card.classList.add('expanded');
                };
                const onCancel = () => cleanup();
                document.getElementById('inputDialogConfirm').addEventListener('click', onConfirm);
                document.getElementById('inputDialogCancel').addEventListener('click', onCancel);
                key.addEventListener('keydown', (e) => { if (e.key === 'Enter') onConfirm(); });
            }

                if (!p || !p.keys) return;
                p.keys.splice(index, 1);

                renderSettingsPlatforms();
                const card = document.querySelector(`[data-platform-id="${platformId}"]`);
                if (card) card.classList.add('expanded');

            window.removeModelUI = function(platformId, modelId) {

                if (!p || !p.models) return;
                const idx = p.models.findIndex(m => m.id === modelId);
                if (idx !== -1) {
                    p.models.splice(idx, 1);

                    renderSettingsPlatforms();
                    refreshModelSelects();

                        : uniqueLLMModels.map(m => `<option value="${escapeHtml(m.id)}"${m.id === curVal ? ' selected' : ''}>${escapeHtml(m.name || m.id)} (${escapeHtml(m.platformName || '')})</option>`).join('');
                    if (curVal && uniqueLLMModels.find(m => m.id === curVal)) {
                        llmSelect.value = curVal;
                    } else if (uniqueLLMModels.length > 0) {
                        currentLLMModel = uniqueLLMModels[0].id;
                        llmSelect.value = currentLLMModel;
                    }
                }

                // Agent 媒体模型选择 (text2img, edit, video)
                const mediaModels = [
                    ...apiManager.getModelsByCapability('text2img'),
                    ...apiManager.getModelsByCapability('edit'),
                    ...apiManager.getModelsByCapability('video')
                ];
                const uniqueMediaModels = [...new Map(mediaModels.map(m => [m.id, m])).values()];
                const mediaSelect = document.getElementById('agentMediaModelSelect');
                if (mediaSelect) {
                    const curVal = mediaSelect.value;
                    mediaSelect.innerHTML = uniqueMediaModels.length === 0

            function renderThumbGrid(containerId, urls = []) {
                const container = document.getElementById(containerId);

                            headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idleKey.value}`, 'X-ModelScope-Async-Mode': 'true' };
                        } else {

            // Agnes平台视频轮询
            async function pollVideo(taskId, apiKey, platformId, timeout = 600000) {
                if (!platformId) {
                    const p = apiManager.getDefaultPlatform('video');
                    platformId = p ? p.id : null;
                }
                const start = Date.now();
                while (Date.now() - start < timeout) {
                    const pollUrl = apiManager.getApiUrl(platformId, '/videos/' + taskId);
                    const res = await fetch(pollUrl, { headers: { 'Authorization': `Bearer ${apiKey}` } });
                    if (!res.ok) throw new Error('轮询失败');
                    const data = await res.json();
                    if (data.status === 'completed') return data.video_url;
                    if (data.status === 'failed') throw new Error('视频生成失败');
                    await new Promise(r => setTimeout(r, 3000));
                }
                throw new Error('超时');
            }

            // 异步任务轮询
            async function pollAsyncTask(platformId, taskId, apiKey, isModelScope, timeout = 600000) {
                const start = Date.now();
                while (Date.now() - start < timeout) {
                    let pollUrl, pollHeaders = { 'Authorization': `Bearer ${apiKey}` };
                    if (isModelScope) {
                        pollUrl = apiManager.getApiUrl(platformId, '/tasks/' + taskId);
                        pollHeaders['X-ModelScope-Task-Type'] = 'image_generation';
                    } else {
                        pollUrl = apiManager.getApiUrl(platformId, '/task/' + taskId);
                    }
                    const res = await fetch(pollUrl, { headers: pollHeaders });
                    if (!res.ok) { await new Promise(r => setTimeout(r, 5000)); continue; }
                    const data = await res.json();
                    // 成功
                    if (data.task_status === 'SUCCEED' || data.status === 'completed' || data.status === 'succeeded') {
                        // 魔搭: output_images[] 或 output.images[].url; 其他: data[].url 或 url
                        const url = data.output_images?.[0]
                            || data.output?.images?.[0]?.url
                            || data.output?.file_url
                            || data.output?.video_url
                            || data.data?.[0]?.url
                            || data.url;
                        if (url) return proxyDownloadUrl(url, platformId);
                        throw new Error('任务成功但未返回结果URL');
                    }
                    // 失败
                    if (data.task_status === 'FAILED' || data.status === 'failed')
                        throw new Error(data.error || data.message || data.error_message || '任务失败');
                    // 进行中，5秒后重试
                    await new Promise(r => setTimeout(r, 5000));
                }
                throw new Error('生成超时');
            }

                function readAndAddImageFiles(files, callback) {
                    let added = 0;

                    if (files.length === 0) { callback(0); return; }
                    files.forEach(file => {
                        const reader = new FileReader();
                        reader.onload = ev => {

                    if (isAgentThumbReorder) return false;

                }

                    const zone = e.target.closest('.agent-input-area, .agent-thumb-add');
                    if (!zone || !canAcceptAgentDrop(e)) return;

            function syncMobileAgentUploadPreview() {

            function setupAgentPreviewDragDrop() {
                const container = document.getElementById('agentPreviewImgs');
                if (!container) return;
                // 滚轮横向滚动
                container.addEventListener('wheel', (e) => {
                    if (e.deltaY !== 0) {
                        e.preventDefault();
                        container.scrollLeft += e.deltaY;
                    }
                }, { passive: false });
                // 拖动排序
                let dragSrc = null;
                container.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const dragging = container.querySelector('.dragging');
                    if (!dragging) return;
                    const items = [...container.querySelectorAll('.agent-thumb-wrap:not(.dragging)')];
                    const afterEl = items.reduce((closest, child) => {
                        const box = child.getBoundingClientRect();
                        const offset = e.clientX - box.left - box.width / 2;
                        if (offset < 0 && offset > closest.offset) return { offset, element: child };
                        return closest;
                    }, { offset: Number.NEGATIVE_INFINITY }).element;
                    if (afterEl) {
                        container.insertBefore(dragging, afterEl);
                    } else {
                        const addBtn = container.querySelector('.agent-thumb-add');
                        if (addBtn) container.insertBefore(dragging, addBtn);
                        else container.appendChild(dragging);
                    }
                });
                container.addEventListener('drop', (e) => {
                    e.preventDefault();
                    // 内部排序完成，更新pendingImages顺序
                    syncAgentPendingImages();
                });
                // 允许从资产库拖入
                container.addEventListener('dragenter', (e) => e.preventDefault());
                container.addEventListener('dragleave', (e) => {
                    if (!container.contains(e.relatedTarget)) {
                        // nothing
                    }
                });
            }

            function syncAgentPendingImages() {
                const container = document.getElementById('agentPreviewImgs');
                if (!container) return;
                const imgs = container.querySelectorAll('.agent-thumb-wrap img');
                agentState.pendingImages = Array.from(imgs).map(img => img.src).filter(v => v && (v.startsWith('data:') || isValidUrl(v)));
            }

                if (!container) return;

                    container?.querySelector('.agent-messages') || agentMessages; if (messagesContainer) { setTimeout(() =>
                    { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 50); } }

            function resetAgentChat() { agentState.messages = [];
                agentState.pendingImages = [];
                agentState.pendingGenerations = {};
                agentMessages.innerHTML = ''; const emptyDiv = document.createElement('div');
                emptyDiv.className = 'agent-empty-state';

                emptyDiv.innerHTML =
                    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="4" ry="4"/><circle cx="12" cy="2" r="1.5" fill="currentColor"/></svg><div class="empty-title">AI 创作助手</div><div class="empty-desc">用自然语言描述你的想法，我会自动分析并帮你生成图像或视频</div>`;
                agentMessages.appendChild(emptyDiv);

            async function sendAgentMessage(textOverride) {
                const text = (textOverride !== undefined ? String(textOverride) : agentInput.value).trim();
                const pendingImgs = [...agentState.pendingImages];
                if (!text && pendingImgs.length === 0) return;
                if (agentState.isProcessing) { showToast('正在思考中，请稍候...', 'info'); return; }
                agentState.isProcessing = true;
                agentSendBtn.disabled = true;
                const mobSendBtn = document.getElementById('mobAgentSendBtn');
                if (mobSendBtn) mobSendBtn.disabled = true;
                agentInput.value = '';
                agentInput.style.height = 'auto';
                agentState.pendingImages = [];
                // 清除输入框上方预览
                const previewImgs = document.getElementById('agentPreviewImgs');
                if (previewImgs) previewImgs.innerHTML = '';
                const previewWrap = document.getElementById('agentUploadPreview');
                if (previewWrap) previewWrap.style.display = 'none';
                updateAgentEmptyState();
                // 添加用户消息
                addAgentMessage('user', text, pendingImgs);
                agentState.messages.push({ role: 'user', content: text, images: pendingImgs });
                // 显示打字动画
                const typingEl = addAgentTyping();
                scrollAgentToBottom();
                try {
                    const response = await callLLMAgent(text, pendingImgs);
                    removeAgentTyping(typingEl);
                    // 尝试解析JSON（支持单个对象或数组）
                    const analysis = tryParseAgentJSON(response);
                    if (analysis) {
                        if (Array.isArray(analysis)) {
                            // 多个生成任务，逐个创建分析卡片
                            analysis.forEach(a => addAgentAnalysisCard(a));
                            agentState.messages.push({ role: 'assistant', content: response, analysis });
                        } else {
                            addAgentAnalysisCard(analysis);
                            agentState.messages.push({ role: 'assistant', content: response, analysis });
                        }
                    } else {
                        addAgentMessage('assistant', response, []);
                        agentState.messages.push({ role: 'assistant', content: response });
                    }
                } catch (e) {
                    removeAgentTyping(typingEl);
                    addAgentMessage('assistant', '抱歉，我遇到了一些问题：' + e.message, []);
                    agentState.messages.push({ role: 'assistant', content: '抱歉，我遇到了一些问题：' + e.message });
                }
                agentState.isProcessing = false;
                agentSendBtn.disabled = false;
                if (mobSendBtn) mobSendBtn.disabled = false;
                updateAgentEmptyState();
                renderSidebarHistory();
                scrollAgentToBottom();
                if (window.innerWidth > 900) {
                    agentInput.focus();
                } else {
                    const mobInput = document.getElementById('mobAgentInput');
                    if (mobInput) mobInput.focus();
                }
                syncMobileAgent();
            }

            async function callLLMAgent(userText, imageUrls = []) {
                const recentMessages = agentState.messages.slice(-6);
                const messages = [{ role: 'system', content: AGENT_SYSTEM_PROMPT }];
                recentMessages.forEach(m => {
                    if (m.images && m.images.length > 0 && m.role === 'user') {
                        const imgHint = m.images.length === 1 ? '[用户上传了1张图片，请设置mode为img2img，不要描述图片内容，基于用户文字描述生成prompt]' : `[用户上传了${m.images.length}张图片，请设置mode为multiimg，不要描述图片内容，基于用户文字描述生成prompt]`;
                        const content = [{ type: 'text', text: (m.content || '') + '\n' + imgHint }];
                        m.images.forEach(url => content.push({ type: 'image_url', image_url: { url } }));
                        messages.push({ role: 'user', content });
                    } else {
                        messages.push({ role: m.role, content: m.content });
                    }
                });
                if (imageUrls.length > 0) {
                    const imgHint = imageUrls.length === 1 ? '[用户上传了1张图片，请设置mode为img2img，不要描述图片内容，基于用户文字描述生成prompt]' : `[用户上传了${imageUrls.length}张图片，请设置mode为multiimg，不要描述图片内容，基于用户文字描述生成prompt]`;
                    const content = [{ type: 'text', text: (userText || '请根据上传的图片生成图像') + '\n' + imgHint }];
                    imageUrls.forEach(url => content.push({ type: 'image_url', image_url: { url } }));
                    messages.push({ role: 'user', content });
                }
                // 使用apiManager获取平台和密钥
                const platform = apiManager.getPlatformByModel(currentLLMModel) || apiManager.getDefaultPlatform('text');
                if (!platform) throw new Error('没有可用的LLM平台');
                const idleKey = apiManager.getIdleKey(platform.id);
                if (!idleKey) throw new Error('所有密钥忙碌，请稍后再试');
                apiManager.markBusy(platform.id, idleKey.value);
                renderKeyLights();
                try {
                    const chatUrl = apiManager.getApiUrl(platform.id, '/chat/completions');
                    const res = await fetch(chatUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idleKey.value}` },
                        body: JSON.stringify({ model: currentLLMModel, messages, temperature: 0.7, max_tokens: 800 })
                    });
                    if (!res.ok) throw new Error(await res.text());
                    const data = await res.json();
                    return data?.choices?.[0]?.message?.content?.trim() || '';
                } finally {
                    apiManager.markIdle(platform.id, idleKey.value);
                    renderKeyLights();
                }
            }

            function tryParseAgentJSON(text) {
                let cleaned = text.trim();
                const codeBlockMatch = cleaned.match(/```(?:json)?\s*\n?([\s\S]*?)\n?```/);
                if (codeBlockMatch) cleaned = codeBlockMatch[1].trim();
                // 尝试匹配数组格式
                const arrayMatch = cleaned.match(/\[[\s\S]*\]/);
                if (arrayMatch) {
                    try {
                        const parsed = JSON.parse(arrayMatch[0]);
                        if (Array.isArray(parsed) && parsed.length > 0 && parsed.every(p => (p.type === 'image' || p.type === 'video') && p.prompt)) {
                            return parsed;
                        }
                    } catch {}
                }
                // 尝试匹配单个对象
                const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
                if (!jsonMatch) return null;
                try {
                    const parsed = JSON.parse(jsonMatch[0]);
                    if (parsed && (parsed.type === 'image' || parsed.type === 'video') && parsed.prompt) {
                        return parsed;
                    }
                } catch { return null; }
                return null;
            }

            function addAgentMessage(role, text, images = []) {

                if (images.length > 0) {
                    imgsHtml = '<div class="msg-images">' + images.map(url =>
                        `<img class="msg-img-thumb" src="${escapeHtml(url)}" onclick="window.openViewer('${escapeHtml(url)}','image','')" title="点击放大">`
                    ).join('') + '</div>';
                }
                msgDiv.innerHTML = `<div class="agent-msg-bubble">${imgsHtml}${escapeHtml(text).replace(/\n/g,'<br>')}</div>`;
                agentMessages.appendChild(msgDiv);
                updateAgentEmptyState();
                syncMobileAgent();
                return msgDiv;
            }
